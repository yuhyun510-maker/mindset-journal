<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마인드셋 저널 — 한계 사고 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --ink: #1C1C1A;
    --ink-muted: #7A7870;
    --ink-faint: #C4C2BB;
    --accent: #4A6741;
    --accent-light: #EAF0E8;
    --accent-warm: #C8763A;
    --accent-warm-light: #FDF3EB;
    --border: #E8E5DE;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .header p {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.7;
  }

  .journal-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink);
    background: var(--bg);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
    background: #FAFAF8;
  }

  textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  .btn-analyze {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    letter-spacing: 0.05em;
  }

  .btn-analyze:hover {
    background: #3A5332;
    transform: translateY(-1px);
  }

  .btn-analyze:disabled {
    background: var(--ink-faint);
    cursor: not-allowed;
    transform: none;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .loading p {
    font-size: 14px;
    color: var(--ink-muted);
    font-style: italic;
  }

  .result-section {
    display: none;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-block {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 28px 32px;
    margin-bottom: 16px;
  }

  .result-block.limits {
    border-left: 4px solid #D4826A;
    background: #FFFAF8;
  }

  .result-block.beliefs {
    border-left: 4px solid #C8A84B;
    background: #FFFDF5;
  }

  .result-block.positive {
    border-left: 4px solid var(--accent);
    background: var(--accent-light);
  }

  .result-block.warmth {
    border-left: 4px solid #8B7BB5;
    background: #F8F6FF;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    line-height: 1.9;
    color: var(--ink);
  }

  .result-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 16px;
  }

  .result-block.limits .result-title { color: #C06040; }
  .result-block.beliefs .result-title { color: #A07830; }
  .result-block.positive .result-title { color: var(--accent); }
  .result-block.warmth .result-title { color: #6B5B9B; }

  .result-content {
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  .btn-reset {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--ink-muted);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-reset:hover {
    border-color: var(--ink-muted);
    color: var(--ink);
  }

  .error-msg {
    display: none;
    background: #FFF0EE;
    border: 1px solid #F5C5BC;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    color: #C05040;
    margin-top: 16px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">마인드셋 프로그램</div>
    <h1>오늘 마음속에 있는 것을<br>그대로 꺼내보세요</h1>
    <p>판단 없이 자유롭게 써주세요. AI가 한계 사고를 찾아드릴게요.</p>
  </div>

  <div class="journal-card">
    <div class="section-label">오늘의 생각 · 감정 · 고민</div>
    <textarea id="journal-input" placeholder="요즘 머릿속에 맴도는 생각들, 걱정되는 것들, 내가 못할 것 같다는 느낌들... 그냥 편하게 써주세요. 일기 쓰듯이요."></textarea>
    <button class="btn-analyze" id="analyze-btn" onclick="analyze()">✦ 내 한계 사고 분석하기</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p>당신의 생각을 조심스럽게 읽고 있어요...</p>
  </div>

  <div class="result-section" id="result-section">

    <div class="result-block limits">
      <div class="result-title">🔍 발견된 한계 사고</div>
      <div class="result-content" id="result-limits"></div>
    </div>

    <div class="result-block beliefs">
      <div class="result-title">🪨 그 아래 숨은 고정관념</div>
      <div class="result-content" id="result-beliefs"></div>
    </div>

    <div class="result-block positive">
      <div class="result-title">🌱 바꿔볼 수 있는 긍정 사고</div>
      <div class="result-content" id="result-positive"></div>
    </div>

    <div class="result-block warmth">
      <div class="result-title">💬 당신에게</div>
      <div class="result-content" id="result-warmth"></div>
    </div>

    <div class="divider"></div>
    <button class="btn-reset" onclick="reset()">↩ 다시 쓰기</button>
  </div>

</div>

<script>
async function analyze() {
  const input = document.getElementById('journal-input').value.trim();
  if (!input || input.length < 20) {
    showError('조금 더 자유롭게 써주세요. 짧아도 괜찮아요, 느낌 그대로 적어주시면 돼요 :)');
    return;
  }

  hideError();
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';

  const systemPrompt = `당신은 무의식 재프로그래밍 전문 코치입니다. 따뜻하고 직접적인 말투로 응답하세요.

사용자가 자유롭게 쓴 감정/생각 일기를 읽고 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

{
  "limits": "발견된 한계 사고 목록. 각 항목은 줄바꿈으로 구분. '나는 ~할 수 없다', '나는 역시 ~할 것이다', '나는 ~인 사람이다(부정)' 형태로 정리",
  "beliefs": "이 한계 사고들을 만들어낸 밑바닥 고정관념. 줄바꿈으로 구분",
  "positive": "각 한계 사고를 바꾼 긍정 사고 제안. '나는 ~하는 사람이다' 형태. 억지스럽지 않고 지금 당장 조금이라도 믿을 수 있는 문장으로. 줄바꿈으로 구분",
  "warmth": "분석이 아닌 사람으로서 건네는 따뜻한 말 2~3문장. 공감과 응원."
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: input }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('result-limits').textContent = parsed.limits || '';
    document.getElementById('result-beliefs').textContent = parsed.beliefs || '';
    document.getElementById('result-positive').textContent = parsed.positive || '';
    document.getElementById('result-warmth').textContent = parsed.warmth || '';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
    showError('분석 중 오류가 생겼어요. 잠시 후 다시 시도해주세요.');
  }
}

function reset() {
  document.getElementById('journal-input').value = '';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('analyze-btn').disabled = false;
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
